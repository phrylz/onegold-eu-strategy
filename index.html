function Acc({ title, sub, count, badge, bc, icon, children, open: defOpen = false }) {
  const [o, setO] = useState(defOpen);

    <div style={{ marginBottom:8, borderRadius:10, border:`1px solid ${o?BORDER:BORDER_L}`, background:WHITE, overflow:"hidden", transition:"border-color 0.2s", boxShadow:o?"0 2px 8px rgba(15,43,60,0.06)":"none" }}>
      <button onClick={()=>setO(!o)} style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"14px 20px", background:"transparent", border:"none", cursor:"pointer", textAlign:"left" }}>
        <span style={{ color:NAVY_MID, fontSize:16, transition:"transform 0.2s", transform:o?"rotate(90deg)":"rotate(0)", flexShrink:0, fontWeight:700 }}>▸</span>
        {icon && <span style={{ fontSize:18, flexShrink:0 }}>{icon}</span>}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
            <span style={{ fontSize:16, fontWeight:700, color:TEXT }}>{title}</span>
            {badge && <span style={{ padding:"2px 9px", borderRadius:4, fontSize:11, fontWeight:700, letterSpacing:"0.04em", textTransform:"uppercase", background:(bc===RED?RED_BG:bc===GREEN?GREEN_BG:bc===ORANGE?ORANGE_BG:GOLD_BG), color:bc||GOLD, fontFamily:"'Merriweather Sans',sans-serif" }}>{badge}</span>}

      </button>

    </div>
  );
}
function Bdg({ children, color }) {
  const bg = color==="critical"?RED_BG:color==="high"?GOLD_BG:color==="low"?GREEN_BG:color==="new"?ORANGE_BG:SKY_BG;
  const fg = color==="critical"?RED:color==="high"?GOLD:color==="low"?GREEN:color==="new"?ORANGE:SKY;
  return <span style={{ display:"inline-block", padding:"2px 8px", borderRadius:4, fontSize:11, fontWeight:700, letterSpacing:"0.04em", textTransform:"uppercase", background:bg, color:fg, fontFamily:"'Merriweather Sans',sans-serif" }}>{children}</span>;
}
function MPill({ market }) {
  const m = markets.find(x=>x.id===market);
  return <span style={{ display:"inline-block", padding:"2px 7px", borderRadius:4, fontSize:11, fontWeight:500, background:LIGHT, color:TEXT2, marginRight:3, fontFamily:"'Merriweather Sans',sans-serif" }}>{m?.flag} {m?.id.toUpperCase()}</span>;

          <Sub>Monthly allocation by channel across three phases — shifting from content-heavy to paid-scale.</Sub>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, marginBottom:20 }}>
            {[{l:"Phase 1",v:"$45K/mo",s:"Months 1–3"},{l:"Phase 2",v:"$56.5K/mo",s:"Months 3–6"},{l:"Phase 3",v:"$68K/mo",s:"Months 6–12"},{l:"12-Month Total",v:"$685,500",s:"All channels"}].map(b=><SC key={b.l} label={b.l} value={b.v} sub={b.s} accent={NAVY} />)}
          </div>
          <Acc title="Budget Breakdown by Channel" icon="💰" count={budgetData.length} open>
            <div style={{ overflowX:"auto", paddingTop:12 }}><table style={{ width:"100%", borderCollapse:"separate", borderSpacing:"0 3px", fontSize:14 }}>
              <thead><tr>{["Channel","Phase 1","Phase 2","Phase 3","12-Mo Total"].map((h,i)=><th key={h} style={{ textAlign:i===0?"left":"right", padding:"8px 12px", fontSize:12, textTransform:"uppercase", letterSpacing:"0.06em", color:TEXT3, borderBottom:`2px solid ${BORDER_L}`, fontWeight:700, fontFamily:"'Merriweather Sans',sans-serif" }}>{h}</th>)}</tr></thead>
              <tbody>
                {budgetData.map((b,i)=><tr key={i} style={{ background:i%2===0?OFFWHITE:WHITE }}><td style={{ padding:"10px 12px", borderRadius:"6px 0 0 6px" }}><div style={{ display:"flex", alignItems:"center", gap:8 }}><div style={{ width:8, height:8, borderRadius:3, background:b.c }} /><span style={{ fontWeight:500, color:NAVY }}>{b.cat}</span></div></td><td style={{ padding:"10px 12px", textAlign:"right", color:TEXT2 }}>${b.p1.toLocaleString()}</td><td style={{ padding:"10px 12px", textAlign:"right", color:TEXT2 }}>${b.p2.toLocaleString()}</td><td style={{ padding:"10px 12px", textAlign:"right", color:TEXT2 }}>${b.p3.toLocaleString()}</td><td style={{ padding:"10px 12px", textAlign:"right", fontWeight:700, color:NAVY, borderRadius:"0 6px 6px 0" }}>${(b.p1*3+b.p2*3+b.p3*6).toLocaleString()}</td></tr>)}
                <tr style={{ borderTop:`2px solid ${GOLD}33` }}><td style={{ padding:"12px 12px", fontWeight:700, color:GOLD }}>TOTAL / MONTH</td><td style={{ padding:"12px", textAlign:"right", fontWeight:700, color:GOLD }}>${budgetData.reduce((s,b)=>s+b.p1,0).toLocaleString()}</td><td style={{ padding:"12px", textAlign:"right", fontWeight:700, color:GOLD }}>${budgetData.reduce((s,b)=>s+b.p2,0).toLocaleString()}</td><td style={{ padding:"12px", textAlign:"right", fontWeight:700, color:GOLD }}>${budgetData.reduce((s,b)=>s+b.p3,0).toLocaleString()}</td><td style={{ padding:"12px", textAlign:"right", fontWeight:700, color:GOLD, fontSize:16 }}>$685,500</td></tr>
              </tbody>
            </table></div>
          </Acc>
          <Acc title="Phase Visual Breakdown" sub="Channel allocation bars showing spend shift" icon="📊">
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14, paddingTop:12 }}>
              {[{l:"Phase 1 (M1–3)",k:"p1",t:45000},{l:"Phase 2 (M3–6)",k:"p2",t:56500},{l:"Phase 3 (M6–12)",k:"p3",t:68000}].map(p=>(
                <div key={p.k} style={{ background:OFFWHITE, borderRadius:8, padding:16, border:`1px solid ${BORDER_L}` }}>
                  <div style={{ fontSize:14, fontWeight:600, color:NAVY }}>{p.l}</div>
                  <div style={{ fontSize:24, fontWeight:700, color:GOLD, fontFamily:"'Playfair Display',serif", marginBottom:14 }}>${p.t.toLocaleString()}/mo</div>
                  {budgetData.map((b,i)=><div key={i} style={{ marginBottom:8 }}><div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:TEXT3, marginBottom:2, fontFamily:"'Merriweather Sans',sans-serif" }}><span>{b.cat}</span><span>${b[p.k].toLocaleString()}</span></div><PBar value={b[p.k]} max={20000} color={b.c} /></div>)}
                </div>
              ))}
            </div>
          </Acc>
        </div>}

        {/* ═══ KPIs ═══ */}
        {aSec==="kpis" && <div className="fu">
          <ST>KPI Targets & Measurement</ST>
          <Sub>Recalibrated after funnel audit — added Checkout Rate and Placed→Paid Rate as new mid-funnel KPIs. First Purchase targets adjusted for real cancellation data.</Sub>
          <Acc title="KPI Progression Table" icon="📈" count={kpis.length} open>
            <div style={{ overflowX:"auto", paddingTop:12 }}><table style={{ width:"100%", borderCollapse:"separate", borderSpacing:"0 3px", fontSize:14 }}>
              <thead><tr>{["Metric","Current","Day 30","Day 60","Day 90","Month 6","Month 12"].map((h,i)=><th key={h} style={{ textAlign:i===0?"left":"center", padding:"8px 12px", fontSize:12, textTransform:"uppercase", letterSpacing:"0.06em", color:TEXT3, borderBottom:`2px solid ${BORDER_L}`, fontWeight:700, fontFamily:"'Merriweather Sans',sans-serif" }}>{h}</th>)}</tr></thead>
              <tbody>{kpis.map((k,i)=><tr key={i} style={{ background:i%2===0?OFFWHITE:WHITE }}><td style={{ padding:"10px 12px", fontWeight:600, color:NAVY, borderRadius:"6px 0 0 6px", whiteSpace:"nowrap" }}>{k.label} {k.isNew && <Bdg color="new">New</Bdg>}</td><td style={{ padding:"10px 12px", textAlign:"center", color:RED, fontWeight:500 }}>{k.current}</td><td style={{ padding:"10px 12px", textAlign:"center", color:TEXT2 }}>{k.d30}</td><td style={{ padding:"10px 12px", textAlign:"center", color:TEXT2 }}>{k.d60}</td><td style={{ padding:"10px 12px", textAlign:"center", color:SKY, fontWeight:500 }}>{k.d90}</td><td style={{ padding:"10px 12px", textAlign:"center", color:GOLD, fontWeight:500 }}>{k.m6}</td><td style={{ padding:"10px 12px", textAlign:"center", fontWeight:700, color:GREEN, borderRadius:"0 6px 6px 0" }}>{k.m12}</td></tr>)}</tbody>
            </table></div>
          </Acc>
          <Acc title="Month 10–12 Milestone" sub="Surpass FlexGold → #4 EU platform" icon="🏆">
            <div style={{ display:"flex", gap:14, alignItems:"flex-start", paddingTop:12 }}>
              <span style={{ fontSize:32 }}>🏆</span>
              <div><div style={{ fontSize:20, fontWeight:700, color:GOLD, fontFamily:"'Playfair Display',serif", marginBottom:6 }}>Surpass FlexGold's 11,400 Monthly EU Visits</div><p style={{ fontSize:15, color:TEXT2, lineHeight:1.6, margin:0 }}>Become #4 European digital precious metals platform — behind BullionVault (302K), VeraCash (105K), and Kinesis (7.8K). Achievable because FlexGold is DACH-only while OneGold addresses four markets simultaneously.</p></div>
            </div>
          </Acc>
          <Acc title="Critical Dependencies" sub="Missing one blocks downstream — load-bearing walls" icon="🔗" count={6}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))", gap:10, paddingTop:12 }}>
              {[{dep:"Credit Card Payments",blocks:"All EU conversion targets",impact:"Wire-only kills sub-€1K AOV conversion",isNew:true},
                {dep:"App UX Fixes (popup, email, compliance)",blocks:"Checkout rate, placed→paid rate",impact:"1-2% EU conversion persists",isNew:true},
                {dep:"Attribution / Deep Linking",blocks:"All campaign optimization and KPI tracking",impact:"Cannot attribute installs to campaigns",isNew:true},
                {dep:"Price Chart Pages",blocks:"Email lead gen, organic, retargeting",impact:"Entire organic engine stalls"},
                {dep:"Hreflang Tags",blocks:"All EU domain rankings",impact:"Domains cannibalize each other"},
                {dep:"Revolut Comparison Pages",blocks:"Meta campaigns, social wedge",impact:"No landing page for largest audience"},
              ].map((d,i)=>(
                <div key={i} style={{ padding:"14px 16px", background:OFFWHITE, borderRadius:8, border:`1px solid ${d.isNew?ORANGE+"44":BORDER_L}`, position:"relative" }}>
                  {d.isNew && <span style={{ position:"absolute", top:8, right:8, fontSize:9, fontWeight:700, color:ORANGE, background:ORANGE_BG, padding:"1px 6px", borderRadius:3, fontFamily:"'Merriweather Sans',sans-serif", textTransform:"uppercase" }}>New</span>}
                  <div style={{ fontSize:16, fontWeight:700, color:NAVY, marginBottom:6, fontFamily:"'Playfair Display',serif" }}>{d.dep}</div>
                  <div style={{ fontSize:12, color:TEXT3, textTransform:"uppercase", fontWeight:600, fontFamily:"'Merriweather Sans',sans-serif" }}>Blocks</div>
                  <div style={{ fontSize:14, color:TEXT2, marginBottom:6, lineHeight:1.4 }}>{d.blocks}</div>
                  <div style={{ fontSize:12, color:RED, fontWeight:700, textTransform:"uppercase", fontFamily:"'Merriweather Sans',sans-serif" }}>If delayed</div>
                  <div style={{ fontSize:14, color:RED, lineHeight:1.4 }}>{d.impact}</div>
                </div>
              ))}
            </div>
          </Acc>
        </div>}

        {/* FOOTER */}
        <div style={{ textAlign:"center", padding:"32px 0 16px", borderTop:`1px solid ${BORDER_L}`, marginTop:32 }}>
          <div style={{ fontSize:12, color:TEXT3, letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"'Merriweather Sans',sans-serif" }}>OneGold EU Digital Media Strategy · March 2026 · v2 Post-Funnel Audit</div>
          <div style={{ fontSize:12, color:BORDER, marginTop:4, fontFamily:"'Merriweather Sans',sans-serif" }}>Synthesized from 9 strategy documents + CMO funnel audit email (March 25, 2026)</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
